name: Lighthouse
on: [pull_request]
jobs:
  lhci:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with: { node-version: "22" }
      - run: npm ci && npm run seed
      - name: Lighthouse CI (Core Web Vitals budget)
        run: npx @lhci/cli@0.13.x autorun || echo "Lighthouse-budget overschreden (zie rapport)"
