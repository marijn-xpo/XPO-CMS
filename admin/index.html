          </div>
        </div>
        <div class="grid dash2" style="margin-bottom:20px">
          <div class="card"><div class="ct" style="margin-bottom:16px">Design-tokens (site-breed)</div>
            <div class="field"><label>Primair</label><div class="row" style="gap:8px;align-items:center"><input type="color" :value="tokens.primary||'#5F8D7A'" @input="tokens.primary=$event.target.value;saveSettings()" style="width:42px;height:32px;border:1px solid var(--line);border-radius:8px;background:none;cursor:pointer"/><input class="inp mono" v-model="tokens.primary" placeholder="leeg = accent" style="flex:1" @change="saveSettings"/></div></div>
            <div class="row" style="gap:12px"><div class="field" style="flex:1"><label>Tekstkleur</label><input class="inp mono" v-model="tokens.text" placeholder="#…" @change="saveSettings"/></div><div class="field" style="flex:1;margin:0"><label>Achtergrond</label><input class="inp mono" v-model="tokens.bg" placeholder="#…" @change="saveSettings"/></div></div>
            <div class="row" style="gap:12px;margin-top:12px"><div class="field" style="flex:1;margin:0"><label>Heading-font</label><input class="inp" v-model="tokens.fontHeading" placeholder="bv. Saira Semi Condensed" @change="saveSettings"/></div><div class="field" style="flex:1;margin:0"><label>Body-font</label><input class="inp" v-model="tokens.fontBody" placeholder="bv. Inter" @change="saveSettings"/></div></div>
          </div>
          <div class="card"><div class="ct" style="margin-bottom:16px">Globale CSS & JS</div>
            <div class="field"><label>Globale CSS (hele site)</label><textarea class="inp mono" rows="4" v-model="globalsCfg.css" @change="saveSettings" placeholder=".mijn-klasse{ … }"></textarea></div>
            <div class="field" style="margin:0"><label>Globale JS (hele site)</label><textarea class="inp mono" rows="4" v-model="globalsCfg.js" @change="saveSettings" placeholder="// bv. analytics"></textarea></div>
            <div class="faint" style="font-size:11.5px;margin-top:8px">Wordt op elke publieke pagina meegegeven. Auteur-vertrouwd.</div>
          </div>
        </div>
        <div class="card"><div class="ct" style="margin-bottom:14px">Live voorbeeld</div>
          <div style="border-radius:var(--r-lg);padding:32px;background:radial-gradient(120% 120% at 80% 0,var(--soft),transparent 60%),var(--raise);border:1px solid var(--line)">
            <div class="eyebrow" style="color:var(--accent)">XPO Screens</div>
            <h2 style="font-size:32px;margin:6px 0 10px">INVITE smart mirror</h2>
            <p class="muted" style="max-width:440px;margin:0 0 18px">Zo zien koppen, tekst en knoppen eruit met de huidige instellingen.</p>
            <div class="row" style="gap:10px"><span class="btn primary">Primaire knop</span><span class="btn ghost">Secundair</span><span class="badge ok"><span class="dotled"></span>Live</span></div>
          </div>
        </div>
      </div>

      <!-- ACTIVITEIT -->
      <div v-else-if="view==='activity'" class="wrap">
        <div class="head"><div class="eyebrow">Governance</div><h1>Activiteit</h1><div class="sub">Wie deed wat — in productie doorgezet naar Azure Sentinel voor audit (ISO 27001).</div></div>
        <div class="card"><div v-if="!activity.length" class="empty" style="padding:30px"><div style="color:var(--text)">Nog geen activiteit</div></div>
          <div v-else><div v-for="a in activity" class="fitem" style="gap:12px;margin-bottom:0;background:transparent;padding:11px 0;border-bottom:1px solid var(--line)">
            <span class="av" style="width:30px;height:30px;border-radius:8px"><icon :n="a.kind==='warn'?'trash':'check'" :s="14"/></span>
            <span style="flex:1">{{ a.text }}</span><span class="faint" style="font-size:12px">{{ dt(a.when) }}</span></div></div>
        </div>
      </div>

    </main>
  </div>

  <!-- OFF-CANVAS -->
  <div v-if="notifOpen" class="oc"><header><h3 class="disp">Meldingen</h3><button class="iconbtn" @click="notifOpen=false"><icon n="x"/></button></header>
    <div class="bd"><div class="notif" v-for="n in [{t:'Welkom in XPO CMS',d:'Je content wordt bewaard',i:'check'},{t:'Tip: publiceer een pagina',d:'En klik Live bekijken',i:'rocket'}]"><div class="ni"><icon :n="n.i" :s="16"/></div><div><div class="nt">{{ n.t }}</div><div class="nd">{{ n.d }}</div></div></div></div></div>
  <div v-if="notifOpen" class="ocscrim" @click="notifOpen=false"></div>

  <!-- NEW PAGE MODAL -->
  <div v-if="palette.open" class="scrim" @click.self="closePalette()" style="align-items:flex-start;padding-top:12vh">
    <div class="modal" style="max-width:560px;width:100%">
      <div class="row" style="gap:8px;align-items:center;margin-bottom:10px"><icon n="search" :s="16"/><input id="palinput" class="inp" v-model="palette.q" @input="paletteSearch" placeholder="Zoek pagina's en posts…" style="flex:1" autocomplete="off"/></div>
      <div v-if="palette.results.length" style="max-height:50vh;overflow:auto">
        <div v-for="r in palette.results" class="layer" @click="paletteGo(r)" style="cursor:pointer">
          <span class="li"><icon n="pages" :s="14"/></span>
          <span style="flex:1;min-width:0;overflow:hidden;text-overflow:ellipsis;white-space:nowrap">{{ r.title }}</span>
          <span class="badge dim">{{ r.type==='post'?'Post':'Pagina' }}</span>
        </div>
      </div>
      <div v-else-if="palette.q" class="faint" style="padding:10px">Geen resultaten.</div>
      <div v-else class="faint" style="padding:10px;font-size:12px">Typ om te zoeken in pagina's en posts · Esc om te sluiten</div>
    </div>
  </div>

  <div v-if="modal==='newpage'" class="scrim" @click.self="modal=null"><div class="modal">
    <header><div class="av" style="border-radius:9px"><icon n="plus" :s="18"/></div><h3 class="disp">Nieuwe pagina</h3><button class="iconbtn" @click="modal=null"><icon n="x"/></button></header>
    <div class="bd"><div class="field"><label>Titel</label><input class="inp" v-model="np.title" @input="np.slug=slugify(np.title)"/></div>
      <div class="field"><label>URL</label><div class="search" style="max-width:none"><span class="mono faint">/</span><input class="mono" v-model="np.slug" style="background:none;border:0;color:var(--text);flex:1;outline:none"/></div></div>
      <div class="field" style="margin:0"><label>Sjabloon</label><div class="seg"><button v-for="t in ['Landing','Product','Markt','Basis']" :class="{on:np.tpl===t}" @click="np.tpl=t">{{ t }}</button></div></div></div>
    <div class="ft"><button class="btn ghost" @click="modal=null">Annuleren</button><button class="btn primary" @click="createPage">Aanmaken en openen</button></div></div></div>

  <!-- RESET MODAL -->
  <div v-if="modal==='reset'" class="scrim" @click.self="modal=null"><div class="modal">
    <header><h3 class="disp">Demodata herstellen?</h3><button class="iconbtn" @click="modal=null"><icon n="x"/></button></header>
    <div class="bd"><p class="muted" style="margin:0">Dit overschrijft alle huidige paginas met de voorbeeldpagina. Dit kan niet ongedaan worden gemaakt.</p></div>
    <div class="ft"><button class="btn ghost" @click="modal=null">Annuleren</button><button class="btn danger" @click="resetAll">Herstellen</button></div></div></div>

  <!-- LIVE PREVIEW -->
  <div v-if="preview.open" class="scrim" @click.self="preview.open=false"><div class="modal wide">
    <div class="previewbar"><span class="badge ok"><span class="dotled"></span>Live render</span><b class="disp" style="font-size:14px">{{ preview.title }}</b><span class="faint" style="font-size:12px">server-side veilige HTML</span><div class="spacer"></div><button class="iconbtn" @click="preview.open=false"><icon n="x"/></button></div>
    <div class="bd"><iframe class="previewframe" :srcdoc="preview.html" sandbox="allow-same-origin"></iframe></div>
  </div></div>

  <!-- ENTITY MODALS -->
  <div v-if="['newuser','newproduct','newcampaign','newtemplate','newkb','newform','newfg','newpost','newpopup'].includes(modal)" class="scrim" @click.self="modal=null"><div class="modal">
    <header><div class="av" style="border-radius:9px"><icon n="plus" :s="18"/></div><h3 class="disp">{{ modalTitle }}</h3><button class="iconbtn" @click="modal=null"><icon n="x"/></button></header>
    <div class="bd">
      <template v-if="modal==='newuser'">
        <div class="field"><label>Naam</label><input class="inp" v-model="nf.name"/></div>
        <div class="field"><label>E-mail</label><input class="inp" v-model="nf.email"/></div>
        <div class="field" style="margin:0"><label>Rol</label><div class="seg"><button v-for="r in ['Editor','Admin','Superadmin']" :class="{on:nf.role===r}" @click="nf.role=r">{{ r }}</button></div></div>
      </template>
      <template v-else-if="modal==='newproduct'">
        <div class="field"><label>Naam</label><input class="inp" v-model="nf.name"/></div>
        <div class="row" style="gap:12px"><div class="field" style="flex:1"><label>Prijs</label><input class="inp" v-model="nf.price" placeholder="€0"/></div><div class="field" style="flex:1"><label>Voorraad</label><input class="inp" type="number" v-model="nf.stock"/></div><div class="field" style="flex:1;margin:0"><label>Categorie</label><input class="inp" v-model="nf.category" placeholder="bv. displays"/></div></div>
        <div class="field"><label>Afbeelding-URL</label><input class="inp mono" v-model="nf.image" placeholder="/uploads/… of https://…"/></div>
        <div class="field" style="margin:0"><label>Beschrijving</label><textarea class="inp" rows="3" v-model="nf.description"></textarea></div>
        <div class="field" style="margin:8px 0 0"><label>Variaties / attributen (bv. Maat, Kleur)</label>
          <div class="rep" v-for="(a,ai) in nf.attributes" :key="ai" style="margin-bottom:6px"><button class="x" @click="rmAttr(ai)"><icon n="x" :s="13"/></button>
            <div class="row" style="gap:8px"><input class="inp" style="flex:1" v-model="a.name" placeholder="Naam (bv. Maat)"/><input class="inp" style="flex:2" v-model="a.options" placeholder="Opties, komma-gescheiden (S, M, L)"/></div></div>
          <button class="btn ghost sm" style="width:100%;justify-content:center" @click="addAttr"><icon n="plus" :s="14"/>Attribuut toevoegen</button>
        </div>
      </template>
      <template v-else-if="modal==='newcampaign'">
        <div class="field"><label>Naam</label><input class="inp" v-model="nf.name"/></div>
        <div class="field" style="margin:0"><label>Kanaal</label><div class="seg"><button v-for="c in ['E-mail','Automation','Social']" :class="{on:nf.channel===c}" @click="nf.channel=c">{{ c }}</button></div></div>
      </template>
      <template v-else-if="modal==='newtemplate'">
        <div class="field"><label>Naam</label><input class="inp" v-model="nf.name"/></div>
        <div class="field" style="margin:0"><label>Soort</label><div class="seg"><button v-for="t in ['Header','Footer','Single','Section']" :class="{on:(nf.type||'Section')===t}" @click="nf.type=t">{{ t }}</button></div></div>
      </template>
      <template v-else-if="modal==='newkb'">
        <div class="field"><label>Titel</label><input class="inp" v-model="nf.title"/></div>
        <div class="field" style="margin:0"><label>Inhoud</label><textarea class="inp" v-model="nf.body"></textarea></div>
      </template>
      <template v-else-if="modal==='newform'">
        <div class="field" style="margin:0"><label>Naam</label><input class="inp" v-model="nf.name" placeholder="bv. Demo aanvragen"/></div>
      </template>
      <template v-else-if="modal==='newpost'">
        <div class="field"><label>Titel</label><input class="inp" v-model="nf.ptitle" placeholder="bv. Showroom tips"/></div>
        <div class="field" v-if="contentTypes.length>1"><label>Type</label><select class="inp" v-model="nf.ptype"><option v-for="t in contentTypes" :value="t.key">{{ t.singular }}</option></select></div>
        <div class="field"><label>Samenvatting</label><textarea class="inp" v-model="nf.pexcerpt" rows="2"></textarea></div>
        <div class="field"><label>Categorieën</label><div class="kv">
          <span v-for="c in postCats" class="badge" :class="nf.pcats.includes(c.id)?'ok':'dim'" style="cursor:pointer" @click="togglePick(nf.pcats,c.id)"><span class="dotled"></span>{{ c.name }}</span>
          <span v-if="!postCats.length" class="faint" style="font-size:12px">Nog geen categorieën — voeg ze toe op de Posts-pagina.</span></div></div>
        <div class="field" style="margin:0"><label>Tags</label><div class="kv">
          <span v-for="t in tagTerms" class="badge" :class="nf.ptags.includes(t.id)?'ok':'dim'" style="cursor:pointer" @click="togglePick(nf.ptags,t.id)"><span class="dotled"></span>{{ t.name }}</span>
          <span v-if="!tagTerms.length" class="faint" style="font-size:12px">Nog geen tags.</span></div></div>
      </template>
      <template v-else-if="modal==='newpopup'">
        <div class="field"><label>Naam (intern)</label><input class="inp" v-model="nf.puname" placeholder="bv. Nieuwsbrief-popup"/></div>
        <div class="row" style="gap:12px">
          <div class="field" style="flex:1"><label>Trigger</label><div class="seg"><button v-for="t in [['load','Laden'],['scroll','Scroll'],['exit','Exit'],['click','Klik']]" :class="{on:nf.putrigger===t[0]}" @click="nf.putrigger=t[0]">{{ t[1] }}</button></div></div>
          <div class="field" style="width:130px;margin:0" v-if="nf.putrigger==='load'||nf.putrigger==='scroll'"><label>{{ nf.putrigger==='load'?'Vertraging (s)':'Scroll (%)' }}</label><input class="inp" type="number" v-model.number="nf.pudelay"/></div>
        </div>
        <div class="field"><label>Conditie</label><div class="seg"><button :class="{on:nf.pucond==='all'}" @click="nf.pucond='all'">Hele site</button><button :class="{on:nf.pucond==='page'}" @click="nf.pucond='page'">Specifieke pagina</button></div></div>
        <div class="field" v-if="nf.pucond==='page'"><label>Pagina-slug</label><input class="inp mono" v-model="nf.pucondval" placeholder="bv. smart-mirrors"/></div>
        <div class="field"><label>Titel</label><input class="inp" v-model="nf.putitle"/></div>
        <div class="field"><label>Tekst</label><textarea class="inp" v-model="nf.pubody" rows="2"></textarea></div>
        <div class="row" style="gap:12px"><div class="field" style="flex:1"><label>Knop-label</label><input class="inp" v-model="nf.pubtnl"/></div><div class="field" style="flex:1;margin:0"><label>Knop-URL</label><input class="inp mono" v-model="nf.pubtnurl"/></div></div>
      </template>
      <template v-else>
        <div class="field"><label>Naam</label><input class="inp" v-model="nf.name" placeholder="bv. Productdetails"/></div>
        <div class="field" style="margin:0"><label>Locatie / voorwaarde</label><input class="inp" v-model="nf.cond" placeholder="bv. Sjabloon = Product"/></div>
      </template>
    </div>
    <div class="ft"><button class="btn ghost" @click="modal=null">Annuleren</button>
      <button class="btn primary" @click="modal==='newuser'?addUser():modal==='newproduct'?addProduct():modal==='newcampaign'?addCampaign():modal==='newtemplate'?addTemplate():modal==='newkb'?addKb():modal==='newform'?addForm():modal==='newpost'?addPost():modal==='newpopup'?savePopup():addFieldGroup()">Aanmaken</button></div>
  </div></div>

  <!-- MEDIA PICKER -->
  <div v-if="pick.open" class="scrim" @click.self="pick.open=false"><div class="modal" style="max-width:640px">
    <header><div class="av" style="border-radius:9px"><icon n="media" :s="18"/></div><h3 class="disp">Kies een afbeelding</h3><button class="iconbtn" @click="pick.open=false"><icon n="x"/></button></header>
    <div class="bd">
      <div v-if="!media.length" class="empty" style="padding:30px"><div style="color:var(--text);font-weight:500">Nog geen media</div><p style="font-size:12.5px">Upload eerst afbeeldingen in het Media-scherm.</p></div>
      <div v-else class="mgrid" style="max-height:50vh;overflow:auto">
        <div class="mcard" v-for="m in media" style="cursor:pointer" @click="chooseMedia(m)"><img :src="m.src"/><div class="mb"><div class="mn">{{ m.name }}</div></div></div>
      </div>
    </div>
  </div></div>

  <!-- TOASTS -->
  <div class="toasts"><div v-for="t in toasts" :key="t.id" class="toast" :class="t.kind"><div class="ti"><icon :n="t.kind==='warn'?'bell':'check'" :s="14"/></div><div><div class="tt">{{ t.tt }}</div><div v-if="t.ts" class="ts">{{ t.ts }}</div></div></div></div>
</div>
</script>
<script> App.template = document.getElementById('tpl').innerHTML; createApp(App).mount('#app'); </script>
</body>
</html>
