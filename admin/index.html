<!DOCTYPE html>
<html lang="nl" data-tenant="xpo">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>XPO CMS</title>
<link rel="preconnect" href="https://fonts.googleapis.com" />
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
<link href="https://fonts.googleapis.com/css2?family=Saira+Semi+Condensed:wght@500;600;700&family=Inter:wght@400;450;500;600&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet" />
<link rel="icon" href="data:,"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/vue/3.4.21/vue.global.prod.min.js"></script>
<style>
:root{
  --bg:#0C0F12; --panel:#101317; --card:#14181C; --raise:#1A1F25; --raise-2:#222831;
  --line:rgba(255,255,255,.055); --line-2:rgba(255,255,255,.10); --hover:rgba(255,255,255,.04);
  --text:#EAEEF2; --dim:#98A2AC; --faint:#5E6872;
  --accent:#5F8D7A; --accent-2:#6FA08C; --soft:rgba(95,141,122,.16); --aline:rgba(95,141,122,.42); --on-accent:#0A130F;
  --ok:#3FB984; --warn:#D9A23B; --danger:#E0575C; --info:#5B8DEF;
  --canvas:#090b0d; --ph:linear-gradient(160deg,#0e1216,#171d24);
  --r:14px; --r-sm:9px; --r-lg:20px; --pill:999px;
  --sb:256px; --tb:62px;
  --sh:0 24px 60px -30px rgba(0,0,0,.75);
  --e:cubic-bezier(.4,.14,.2,1);
}
[data-tenant="altermedia"]{ --accent:#E72B2B; --accent-2:#FF4747; --soft:rgba(231,43,43,.13); --aline:rgba(231,43,43,.42); --on-accent:#fff; }
[data-mode="light"]{
  --bg:#F4F6F8; --panel:#FFFFFF; --card:#FFFFFF; --raise:#F1F3F6; --raise-2:#E6EAEF;
  --line:rgba(15,23,30,.08); --line-2:rgba(15,23,30,.14); --hover:rgba(15,23,30,.045);
  --text:#1A2026; --dim:#5C6873; --faint:#93A0AB;
  --canvas:#E7EBEE; --ph:linear-gradient(160deg,#e7ebee,#dbe1e7);
  --sh:0 20px 50px -28px rgba(20,30,40,.30);
}
*{box-sizing:border-box}
html,body{margin:0;height:100%}
body{background:var(--bg);color:var(--text);font-family:"Inter",system-ui,sans-serif;font-size:14px;line-height:1.55;-webkit-font-smoothing:antialiased;overflow:hidden}
h1,h2,h3,h4,h5,.disp{font-family:"Saira Semi Condensed","Inter",sans-serif;margin:0;font-weight:600;letter-spacing:.2px}
.mono{font-family:"JetBrains Mono",monospace}
button{font:inherit;color:inherit;cursor:pointer;border:0;background:none;padding:0}
a{color:inherit;text-decoration:none}
input,textarea,select{font:inherit}
:focus-visible{outline:2px solid var(--accent);outline-offset:2px;border-radius:6px}
::-webkit-scrollbar{width:10px;height:10px}
::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;border:3px solid var(--bg)}
::selection{background:var(--soft)}
.muted{color:var(--dim)} .faint{color:var(--faint)}

/* shell */
#app{height:100%}
.shell{display:grid;grid-template-columns:var(--sb) 1fr;height:100vh;height:100dvh}
.sidebar{background:var(--panel);border-right:1px solid var(--line);display:flex;flex-direction:column;min-width:0;z-index:40}
.brand{display:flex;align-items:center;gap:11px;padding:20px 20px 18px}
.brand .logo{width:30px;height:30px;border-radius:9px;display:grid;place-items:center;background:var(--accent);color:var(--on-accent);font-weight:700;font-family:"Saira Semi Condensed";font-size:15px}
.brand b{font-family:"Saira Semi Condensed";font-weight:600;font-size:16px}
.brand small{display:block;color:var(--faint);font-size:10px;letter-spacing:1.6px;text-transform:uppercase;margin-top:-1px}
.nav{padding:6px 12px;overflow-y:auto;flex:1}
.nav .grp{color:var(--faint);font-size:10px;letter-spacing:1.4px;text-transform:uppercase;padding:16px 10px 6px}
.nav a{display:flex;align-items:center;gap:12px;padding:8px 10px;border-radius:var(--r-sm);color:var(--dim);font-weight:450;position:relative;transition:.14s var(--e)}
.nav a .ic{width:18px;height:18px;flex:none;opacity:.8}
.nav a:hover{color:var(--text);background:var(--hover)}
.nav a.on{color:var(--text);background:var(--soft)}
.nav a.on .ic{opacity:1;color:var(--accent)}
.nav a.on::before{content:"";position:absolute;left:-12px;top:9px;bottom:9px;width:3px;border-radius:0 3px 3px 0;background:var(--accent)}
.nav a .pill{margin-left:auto;font-size:10px;font-weight:600;color:var(--faint)}
.nav a.on .pill{color:var(--accent)}
.sb-foot{padding:12px;border-top:1px solid var(--line)}
.userchip{display:flex;align-items:center;gap:10px;padding:7px 8px;border-radius:var(--r);transition:.14s}
.userchip:hover{background:var(--hover)}
.av{width:30px;height:30px;border-radius:9px;background:var(--soft);color:var(--accent);display:grid;place-items:center;font-weight:600;font-family:"Saira Semi Condensed";font-size:13px;flex:none}
.userchip .nm{font-weight:500;font-size:13px}.userchip .ro{color:var(--faint);font-size:11px}

.main{display:flex;flex-direction:column;min-width:0;overflow:hidden}
.topbar{height:var(--tb);flex:none;display:flex;align-items:center;gap:14px;padding:0 24px;border-bottom:1px solid var(--line)}
.iconbtn{width:36px;height:36px;border-radius:10px;display:grid;place-items:center;color:var(--dim);transition:.14s}
.iconbtn:hover{background:var(--hover);color:var(--text)}
.burger{display:none}
.crumbs{display:flex;align-items:center;gap:9px;color:var(--faint);font-size:13px}
.crumbs b{color:var(--text);font-weight:500}
.search{flex:1;max-width:340px;display:flex;align-items:center;gap:9px;background:var(--raise);border:1px solid transparent;border-radius:var(--pill);padding:8px 14px;color:var(--faint);transition:.14s}
.search:focus-within{border-color:var(--aline)}
.search input{flex:1;background:none;border:0;color:var(--text);outline:none;font-size:13px}
.search kbd{font-family:"JetBrains Mono";font-size:10px;color:var(--faint);background:rgba(255,255,255,.05);border-radius:5px;padding:1px 6px}
.spacer{flex:1}
.tsw{display:flex;background:var(--raise);border-radius:var(--pill);padding:3px}
.tsw button{padding:5px 14px;border-radius:var(--pill);font-weight:500;font-size:12.5px;color:var(--dim);transition:.18s var(--e)}
.tsw button.on{background:var(--accent);color:var(--on-accent);font-weight:600}
.dot{position:relative}
.dot::after{content:"";position:absolute;top:6px;right:6px;width:7px;height:7px;border-radius:99px;background:var(--accent);border:2px solid var(--panel)}

.view{flex:1;overflow-y:auto;padding:36px 40px 80px}
.view.flush{padding:0;overflow:hidden}
.wrap{max-width:1180px;margin:0 auto}
.head{margin-bottom:32px}
.eyebrow{color:var(--accent);font-size:11px;font-weight:600;letter-spacing:1.8px;text-transform:uppercase;margin-bottom:9px}
.head h1{font-size:27px;font-weight:600}
.head .sub{color:var(--dim);margin-top:6px;max-width:560px}
.head-row{display:flex;align-items:flex-end;gap:20px;flex-wrap:wrap}
.head-row .actions{margin-left:auto;display:flex;gap:10px}

/* buttons */
.btn{display:inline-flex;align-items:center;gap:8px;padding:9px 16px;border-radius:var(--pill);font-weight:500;font-size:13px;transition:.15s var(--e);border:1px solid transparent;white-space:nowrap}
.btn.primary{background:var(--accent);color:var(--on-accent);font-weight:600}
.btn.primary:hover{background:var(--accent-2)}
.btn.ghost{background:transparent;border-color:var(--line-2);color:var(--text)}
.btn.ghost:hover{background:var(--hover)}
.btn.subtle{color:var(--dim)} .btn.subtle:hover{color:var(--text);background:var(--hover)}
.btn.sm{padding:6px 13px;font-size:12.5px}
.btn[disabled]{opacity:.4;pointer-events:none}

/* cards */
.grid{display:grid;gap:20px}
.k4{grid-template-columns:repeat(4,1fr)} .k3{grid-template-columns:repeat(3,1fr)} .k2{grid-template-columns:repeat(2,1fr)}
.card{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);padding:22px;box-shadow:inset 0 1px 0 rgba(255,255,255,.04)}
.card.hov{transition:transform .2s var(--e),border-color .2s,box-shadow .2s} .card.hov:hover{border-color:var(--line-2);transform:translateY(-2px);box-shadow:var(--sh)}
.card.pad-sm{padding:16px}
.ct{font-size:15px;font-weight:600}
.kpi .lbl{color:var(--dim);font-size:13px;font-weight:450}
.kpi .val{font-family:"Saira Semi Condensed";font-size:32px;font-weight:600;margin-top:10px;line-height:1}
.kpi .delta{font-size:12px;margin-top:9px;color:var(--faint)}
.kpi .delta b{font-weight:600} .up b{color:var(--ok)} .down b{color:var(--danger)}
.tile{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden;transition:.18s var(--e)}
.tile:hover{border-color:var(--line-2)}
.tile .thumb{height:128px;background:var(--ph);position:relative;display:grid;place-items:center}
.tile .thumb .device{width:42px;height:74px;border-radius:7px;background:linear-gradient(160deg,#283038,#0f1418);box-shadow:inset 0 0 0 3px #0b0f13}
.tile .thumb .dn{position:absolute;left:14px;top:13px;font-family:"Saira Semi Condensed";font-weight:600;letter-spacing:1px;font-size:12px;color:var(--dim)}
.tile .body{padding:16px 18px}
.tile .body h4{font-size:15px}.tile .body p{color:var(--dim);font-size:12.5px;margin:4px 0 0}
.badge{display:inline-flex;align-items:center;gap:6px;font-size:11px;font-weight:500;padding:3px 9px;border-radius:99px;background:var(--raise);color:var(--dim)}
.badge.ok{color:var(--ok)} .badge.warn{color:var(--warn)} .badge.dim{color:var(--faint)}
.dotled{width:6px;height:6px;border-radius:99px;background:currentColor}

/* table */
.tbl{background:var(--card);border:1px solid var(--line);border-radius:var(--r-lg);overflow:hidden}
.tbl-top{display:flex;align-items:center;gap:10px;padding:14px 18px;border-bottom:1px solid var(--line)}
table{width:100%;border-collapse:collapse}
th{text-align:left;color:var(--faint);font-size:10.5px;letter-spacing:.6px;text-transform:uppercase;font-weight:600;padding:12px 18px;border-bottom:1px solid var(--line)}
td{padding:14px 18px;border-bottom:1px solid var(--line);font-size:13.5px}
tr:last-child td{border-bottom:0}
tbody tr{transition:.12s} tbody tr:hover{background:var(--hover)}
.rt{font-weight:500} .rs{color:var(--faint);font-size:12px}

/* tabs */
.tabs{display:flex;gap:6px;border-bottom:1px solid var(--line);margin-bottom:26px}
.tabs button{padding:10px 14px;color:var(--dim);font-weight:500;position:relative;border-radius:9px 9px 0 0;transition:.16s var(--e)}
.tabs button:hover{color:var(--text);background:var(--hover)}
.tabs button.on{color:var(--text)}
.tabs button.on::after{content:"";position:absolute;left:14px;right:14px;bottom:-1px;height:2px;border-radius:2px;background:var(--accent)}

/* forms */
.field{margin-bottom:16px}
.field label{display:block;font-size:12px;font-weight:500;color:var(--dim);margin-bottom:7px}
.inp{width:100%;background:var(--raise);border:1px solid var(--line);border-radius:var(--r-sm);padding:9px 12px;color:var(--text);outline:none;transition:.14s}
.inp:focus{border-color:var(--aline)}
textarea.inp{resize:vertical;min-height:62px;line-height:1.5}

.seg.seg-wrap{flex-wrap:wrap;height:auto}
.seg.seg-wrap button{flex:0 0 auto}
.seg{display:flex;gap:3px;background:var(--raise);border-radius:var(--r-sm);padding:3px}
.seg button{flex:1;padding:7px 8px;border-radius:7px;color:var(--dim);font-weight:500;font-size:12px;transition:.14s}
.seg button.on{background:var(--accent);color:var(--on-accent);font-weight:600}
.sw{width:38px;height:22px;border-radius:99px;background:var(--raise-2);position:relative;transition:.18s;flex:none}
.sw.on{background:var(--accent)}
.sw i{position:absolute;top:2px;left:2px;width:18px;height:18px;border-radius:99px;background:#fff;transition:.18s var(--e)}
.sw.on i{left:18px}
input[type=range]{-webkit-appearance:none;width:100%;height:4px;border-radius:99px;background:var(--raise-2);outline:none}
input[type=range]::-webkit-slider-thumb{-webkit-appearance:none;width:15px;height:15px;border-radius:99px;background:var(--accent);cursor:pointer;border:3px solid var(--card)}
.row{display:flex;align-items:center;gap:14px}
.chip{padding:5px 11px;border-radius:99px;background:var(--raise);color:var(--dim);font-size:12px;font-weight:500;cursor:pointer;transition:.14s;border:1px solid transparent}
.chip.on{background:var(--soft);color:var(--accent);border-color:var(--aline)}
.colorbox{width:30px;height:30px;border-radius:8px;border:1px solid var(--line-2);cursor:pointer;overflow:hidden;padding:0}
.colorbox input{opacity:0;width:200%;height:200%;cursor:pointer}

/* settings row */
.srow{display:flex;align-items:center;gap:16px;padding:15px 0;border-bottom:1px solid var(--line)}
.srow:last-child{border-bottom:0}
.srow .si{width:36px;height:36px;border-radius:10px;background:var(--raise);color:var(--accent);display:grid;place-items:center;flex:none}
.srow .st{font-weight:500} .srow .sd{color:var(--faint);font-size:12px;margin-top:1px}

/* modal */
.scrim{position:fixed;inset:0;background:rgba(4,6,8,.66);backdrop-filter:blur(5px);z-index:90;display:grid;place-items:center;padding:20px;animation:fade .2s var(--e)}
.modal{width:100%;max-width:500px;background:var(--card);border:1px solid var(--line-2);border-radius:22px;box-shadow:0 44px 100px -44px rgba(0,0,0,.82),inset 0 1px 0 rgba(255,255,255,.05);animation:pop .26s var(--e);overflow:hidden}
.modal header{display:flex;align-items:center;gap:12px;padding:18px 20px;border-bottom:1px solid var(--line)}
.modal header h3{font-size:17px;flex:1}
.modal .bd{padding:20px}
.modal .ft{display:flex;justify-content:flex-end;gap:10px;padding:16px 20px;border-top:1px solid var(--line)}
@keyframes fade{from{opacity:0}} @keyframes pop{from{opacity:0;transform:translateY(14px) scale(.985)}}

/* off-canvas */
.oc{position:fixed;top:0;right:0;bottom:0;width:384px;max-width:88vw;background:var(--card);border-left:1px solid var(--line-2);box-shadow:-30px 0 60px -30px #000;z-index:96;display:flex;flex-direction:column;animation:slideR .24s var(--e)}
@keyframes slideR{from{transform:translateX(100%)}}
.oc header{display:flex;align-items:center;gap:10px;padding:18px 20px;border-bottom:1px solid var(--line)}
.oc header h3{flex:1;font-size:16px}
.oc .bd{flex:1;overflow-y:auto;padding:8px}
.notif{display:flex;gap:12px;padding:13px;border-radius:var(--r);transition:.12s}
.notif:hover{background:var(--hover)}
.notif .ni{width:32px;height:32px;border-radius:9px;flex:none;display:grid;place-items:center;background:var(--soft);color:var(--accent)}
.notif .nt{font-weight:500;font-size:13px}.notif .nd{color:var(--faint);font-size:11.5px;margin-top:2px}

/* toasts */
.toasts{position:fixed;right:22px;bottom:22px;z-index:120;display:flex;flex-direction:column;gap:10px}
.toast{display:flex;align-items:center;gap:12px;background:var(--raise);border:1px solid var(--line-2);border-radius:var(--r);padding:12px 15px;min-width:270px;max-width:360px;box-shadow:var(--sh);animation:slideU .24s var(--e)}
.toast .ti{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;flex:none;background:var(--soft);color:var(--accent)}
.toast.ok .ti{background:rgba(63,185,132,.16);color:var(--ok)} .toast.warn .ti{background:rgba(217,162,59,.16);color:var(--warn)}
.toast .tt{font-weight:500;font-size:13px}.toast .ts{color:var(--dim);font-size:12px}
@keyframes slideU{from{opacity:0;transform:translateY(12px)}}

/* onboarding */
.coach-scrim{position:fixed;inset:0;z-index:110;animation:fade .2s}
.spot{position:fixed;z-index:111;border-radius:12px;box-shadow:0 0 0 9999px rgba(4,6,8,.66),0 0 0 1px var(--aline);transition:.26s var(--e);pointer-events:none}
.coach{position:fixed;z-index:112;width:296px;background:var(--card);border:1px solid var(--line-2);border-radius:var(--r-lg);box-shadow:var(--sh);padding:18px;animation:pop .22s var(--e)}
.coach .step{color:var(--accent);font-size:10.5px;font-weight:600;letter-spacing:1.4px;text-transform:uppercase}
.coach h4{font-size:16px;margin:7px 0 7px}
.coach p{color:var(--dim);font-size:13px;margin:0 0 16px}
.coach .nav-c{display:flex;align-items:center;gap:8px}
.coach .dots{display:flex;gap:5px;flex:1}
.coach .dots i{width:5px;height:5px;border-radius:99px;background:var(--line-2);transition:.2s}
.coach .dots i.on{background:var(--accent);width:16px}

/* ===== STUDIO ===== */
.studio{display:grid;grid-template-columns:248px 1fr 308px;height:100%;min-height:0}
.studio .pane{min-height:0;overflow-y:auto;overscroll-behavior:contain;scrollbar-width:thin;scrollbar-color:var(--line-2) transparent;background:var(--panel)}
.studio .pane::-webkit-scrollbar{width:10px}
.studio .pane::-webkit-scrollbar-thumb{background:var(--line-2);border-radius:99px;border:3px solid var(--panel)}
.studio .left{border-right:1px solid var(--line)}
.studio .right{border-left:1px solid var(--line)}
.sbar{height:52px;flex:none;display:flex;align-items:center;gap:10px;padding:0 16px;border-bottom:1px solid var(--line);background:var(--panel)}
.ptab{display:flex;gap:2px;padding:10px 12px 0}
.ptab button{flex:1;padding:8px;border-radius:8px 8px 0 0;color:var(--dim);font-weight:500;font-size:12.5px;transition:.14s}
.ptab button.on{color:var(--text);background:var(--card)}
.psearch{margin:10px 12px;display:flex;align-items:center;gap:8px;background:var(--raise);border-radius:var(--r-sm);padding:7px 11px;color:var(--faint)}
.psearch input{flex:1;background:none;border:0;color:var(--text);outline:none;font-size:12.5px}
.wcat{color:var(--faint);font-size:10px;letter-spacing:1.2px;text-transform:uppercase;padding:12px 14px 5px}
.witem{display:flex;align-items:center;gap:11px;margin:2px 8px;padding:9px 10px;border-radius:var(--r-sm);cursor:grab;transition:.13s;color:var(--dim);border:1px solid transparent}
.witem:hover{background:var(--card);color:var(--text);border-color:var(--line)}
.witem .wic{width:30px;height:30px;border-radius:8px;display:grid;place-items:center;background:var(--raise);color:var(--accent);flex:none}
.witem b{font-size:13px;font-weight:500;display:block}.witem small{font-size:11px;color:var(--faint)}
/* layers */
.layer{display:flex;align-items:center;gap:9px;margin:2px 8px;padding:8px 10px;border-radius:var(--r-sm);color:var(--dim);transition:.12s;cursor:pointer;border:1px solid transparent}
.layer:hover{background:var(--card);color:var(--text)}
.layer.sel{background:var(--soft);color:var(--text);border-color:var(--aline)}
.layer .li{width:24px;height:24px;border-radius:7px;display:grid;place-items:center;background:var(--raise);color:var(--accent);flex:none}
.layer .lacts{margin-left:auto;display:flex;gap:1px;opacity:0;transition:.12s}
.layer:hover .lacts,.layer.sel .lacts{opacity:1}
.layer .lacts button{width:24px;height:24px;border-radius:6px;color:var(--faint)}
.layer .lacts button:hover{background:var(--raise-2);color:var(--text)}
/* canvas */
.canvas-wrap{background:var(--canvas);overflow:auto;padding:30px;display:flex;justify-content:center}
.frame{width:100%;background:#0b0e11;border:1px solid var(--line);border-radius:14px;overflow:hidden;min-height:240px;transition:max-width .3s var(--e);align-self:flex-start}
.node{position:relative;transition:.12s;cursor:pointer}
.node.sel{box-shadow:inset 0 0 0 2px var(--accent)}
.node:not(.sel):hover{box-shadow:inset 0 0 0 1px var(--aline)}
.node .tag{position:absolute;top:0;left:0;transform:translateY(-100%);background:var(--accent);color:var(--on-accent);font-size:10px;font-weight:600;padding:2px 8px;border-radius:6px 6px 0 0;opacity:0;transition:.12s;pointer-events:none;z-index:2}
.node.sel .tag{opacity:1}
.node.hid{opacity:.32}
.node .hid-tag{position:absolute;top:6px;right:6px;background:var(--raise-2);color:var(--dim);font-size:10px;padding:2px 7px;border-radius:99px;z-index:2}
.dropzone{min-height:54px;display:grid;place-items:center;color:var(--faint);font-size:12px;border:1px dashed var(--line-2);border-radius:10px;margin:12px}
.dropzone.over{border-color:var(--accent);background:var(--soft);color:var(--accent)}
/* widget render */
.wbg{position:relative}
.bg-dark{background:radial-gradient(120% 120% at 82% 0,rgba(255,255,255,.05),transparent 55%),#0a0d10}
.bg-accent{background:linear-gradient(120deg,#06100e 25%,var(--accent) 240%);color:#fff}
.bg-light{background:#f3f5f7;color:#0b0e11}
.bg-none{background:transparent}
.winner{}

const LIMITS = { maxDepth:24, maxNodes:5000 };
function ensureMeta(node){
  if(!node.settings._style) node.settings._style={ bg: node.type==="xpo/hero"?"dark":"none", align:"left", pad: node.type==="xpo/hero"?54:28, maxw:0 };
  const s=node.settings._style;
  if(s.fBright==null)s.fBright=100; if(s.fContrast==null)s.fContrast=100; if(s.fBlur==null)s.fBlur=0; if(s.overlayOpacity==null)s.overlayOpacity=0;
  if(!node.settings._adv) node.settings._adv={ hideOn:[] };
}
function makeNode(type){ const n={id:nid(),type,settings:widgetDefs[type].def()}; ensureMeta(n); return n; }
function emptyPageTree(){ return { id:nid(), type:"core/root", settings:{}, children:[] }; }

/* validatie — mirror van de backend (onbekend type, regels, diepte/aantal) */
function validateTree(root){
  const issues=[]; let count=0;
  const walk=(b,path,depth)=>{
    if(depth>LIMITS.maxDepth){ issues.push({path,message:`Maximale nestdiepte (${LIMITS.maxDepth}) overschreden`}); return; }
    if(++count>LIMITS.maxNodes){ issues.push({path,message:`Maximaal aantal blocks overschreden`}); return; }
    const def=widgetDefs[b.type];
    if(b.type!=="core/root" && !def){ issues.push({path,message:`Onbekend widget-type '${b.type}'`}); return; }
    if(def&&def.rules){ for(const m of def.rules(b.settings||{})) issues.push({path,message:m}); }
    (b.children||[]).forEach((c,i)=>walk(c,`${path}.children[${i}]`,depth+1));
  };
  walk(root,"root",0);
  return { ok:issues.length===0, issues };
}

/* ===== veilige string-render (voor de live preview-iframe) ===== */
function cssId(id){ return String(id).replace(/[^a-zA-Z0-9_-]/g,""); }
function safeColor(v){ const s=String(v??"").trim(); if(/^#([0-9a-fA-F]{3}|[0-9a-fA-F]{6}|[0-9a-fA-F]{8})$/.test(s))return s; if(/^rgba?\(\s*[\d.]+\s*,\s*[\d.]+\s*,\s*[\d.]+\s*(,\s*[\d.]+\s*)?\)$/.test(s))return s; if(/^[a-z]{3,20}$/i.test(s))return s; return ""; }

/* ===== persistente opslag (artifact-storage met in-memory fallback) ===== */
const STORE_KEY = "xpo-cms:pages:v1";
const mem = { data:null };
const store = {
  async get(){
    try { if (window.storage){ const r=await window.storage.get(STORE_KEY); return r? JSON.parse(r.value):null; } }
    catch(e){ /* key bestaat nog niet */ }
    return mem.data;
  },
  async set(obj){
    mem.data = obj;
    try { if (window.storage) await window.storage.set(STORE_KEY, JSON.stringify(obj)); return true; }
    catch(e){ console.warn("storage faalde, in-memory gebruikt", e); return false; }
  },
};

    if (!res.ok) { let e; try{ e=await res.json(); }catch(_){ e={error:res.statusText}; } const err=new Error(e.error||"Fout"); err.issues=e.issues; err.status=res.status; throw err; }
    return res.status===204 ? null : res.json();
  }
  return {
    async login(email,password){ const r=await req("/api/auth/login",{method:"POST",body:JSON.stringify({email,password})}); token=r.token; return r.user; },
    setToken(t){ token=t; },
    getToken(){ return token; },

    const hist=reactive({stack:[],ptr:-1}); let applying=true, timer=null;
    function resetHistory(){ hist.stack=[]; hist.ptr=-1; if(tree.value){ hist.stack.push(JSON.stringify(tree.value)); hist.ptr=0; } }
    function commit(){ if(applying||!tree.value)return; const s=JSON.stringify(tree.value); if(hist.stack[hist.ptr]===s)return; hist.stack=hist.stack.slice(0,hist.ptr+1); hist.stack.push(s); hist.ptr++; if(hist.stack.length>60){hist.stack.shift();hist.ptr--;} }
    function applySnap(s){ applying=true; const obj=JSON.parse(s); if(current.value){ current.value.blocks=obj; if(!findNode(obj,selId.value))selId.value=(obj.children[0]||{}).id||null; } nextTick(()=>{applying=false;}); }
    function undo(){ if(hist.ptr>0){hist.ptr--;applySnap(hist.stack[hist.ptr]);markDirty();} }
    function redo(){ if(hist.ptr<hist.stack.length-1){hist.ptr++;applySnap(hist.stack[hist.ptr]);markDirty();} }
    const canUndo=computed(()=>hist.ptr>0), canRedo=computed(()=>hist.ptr<hist.stack.length-1);
    watch(tree,()=>{ if(applying)return; dirty.value=true; clearTimeout(timer); timer=setTimeout(commit,400); },{deep:true});

      catch(e){ toast("Niet opgeslagen", firstIssue(e), "warn"); } }
    async function setDefaultLang(l){ const prev=languages.map(x=>({code:x.code,default:x.default}));
      languages.forEach(x=>x.default=(x.code===l.code)); if(!l.enabled)l.enabled=true;
      try{ await API.langDefault(l.code); }catch(e){ prev.forEach(pp=>{const x=languages.find(y=>y.code===pp.code); if(x)x.default=pp.default;}); toast("Mislukt", firstIssue(e), "warn"); } }
    async function toggleLang(l){ if(l.default){toast("Standaardtaal","Kan niet worden uitgeschakeld","warn");return;} const prev=l.enabled; l.enabled=!l.enabled;
      try{ await API.langEnabled(l.code,l.enabled); }catch(e){ l.enabled=prev; toast("Mislukt", firstIssue(e), "warn"); } }
    async function removeLanguage(l){ if(l.default){toast("Standaardtaal","Kan niet worden verwijderd","warn");return;}
      const i=languages.indexOf(l); if(i>-1)languages.splice(i,1);
      try{ await API.langDelete(l.code); }catch(e){ toast("Verwijderen mislukt", firstIssue(e), "warn"); if(i>-1)languages.splice(i,0,l); } }
    async function addFieldGroup(){ if(!nf.name){toast("Naam vereist","","warn");return;}
      try{ const g=await API.fgCreate({name:nf.name,location:nf.cond||"Alle pagina's"}); fieldGroups.unshift(g); fgId.value=g.id; modal.value=null; log("Veldgroep aangemaakt: "+g.name); toast("Veldgroep aangemaakt",g.name); }
      catch(e){ toast("Niet opgeslagen", firstIssue(e), "warn"); } }
    function selectFG(g){ fgId.value=g.id; }
    async function analyzePage(p){ if(!p||!p.id){toast("Sla de pagina eerst op","","warn");return;} try{ const r=await API.seoAnalyze(p.id, (p.seo&&p.seo.keyword)||""); seoResults[p.id]=r; }catch(e){ toast("Analyse mislukt", firstIssue(e), "warn"); } }
    async function loadReviews(){ try{ const r=await API.reviewsList(); reviewsQ.splice(0,reviewsQ.length,...r); }catch(_e){} }
    async function moderateReview(rv,action){ try{ await API.reviewAction(rv.id,action); if(action==="delete"){ const i=reviewsQ.indexOf(rv); if(i>-1)reviewsQ.splice(i,1);} else rv.status=action==="approve"?"approved":"rejected"; }catch(e){ toast("Mislukt","","warn"); } }
    async function loadCustomers(){ try{ const c=await API.customersList(); customers.splice(0,customers.length,...c); }catch(_e){} }
    async function toggleOrder(o){ if(orderOpen[o.id]){ orderOpen[o.id]=null; return; } try{ orderOpen[o.id]=await API.orderDetail(o.id); }catch(e){ toast("Kon order niet laden","","warn"); } }
    async function refundOrder(o){ if(!confirm("Order "+o.id+" terugbetalen?"))return; try{ await API.orderRefund(o.id,true); o.status="refunded"; if(orderOpen[o.id])orderOpen[o.id].status="refunded"; toast("Terugbetaald",o.id,"warn"); }catch(e){ toast("Mislukt","","warn"); } }
    function addAttr(){ nf.attributes.push({name:"",options:""}); }
    function rmAttr(i){ nf.attributes.splice(i,1); }
    function addShip(){ shopCfg.shipping.push({name:"Nieuwe methode",price:0}); saveSettings(); }
    function rmShip(i){ shopCfg.shipping.splice(i,1); saveSettings(); }
    async function loadAnalytics(){ try{ const o=await API.analyticsOverview(); Object.assign(anaOverview, o); }catch(_e){} }
    function addFGField(){ const g=currentFG.value; if(!g)return; g.fields.push({id:genId("cf"),label:nf.flabel||"Nieuw veld",type:nf.ftype}); nf.flabel=""; saveFG(g); }
    function removeFGField(i){ const g=currentFG.value; g.fields.splice(i,1); saveFG(g); }
    async function removeFieldGroup(g){ const i=fieldGroups.indexOf(g); if(i>-1)fieldGroups.splice(i,1); if(fgId.value===g.id)fgId.value=(fieldGroups[0]||{}).id||null;
      try{ await API.fgDelete(g.id); }catch(e){ toast("Verwijderen mislukt", firstIssue(e), "warn"); if(i>-1)fieldGroups.splice(i,0,g); } }

    /* ---- redirects ---- */
    async function addRedirect(){ if(!nf.from){toast("Bron-URL vereist","","warn");return;}
      try{ const created=await API.redirectCreate({from:nf.from,to:nf.to||"/",code:nf.code||"301"}); redirects.unshift(created); nf.from="";nf.to="";nf.code="301"; toast("Redirect toegevoegd",created.from+" \u2192 "+created.to); }
      catch(e){ toast("Niet opgeslagen", firstIssue(e), "warn"); } }
    async function removeRedirect(r){ const i=redirects.indexOf(r); if(i>-1)redirects.splice(i,1);
      try{ await API.redirectDelete(r.id); }catch(e){ toast("Verwijderen mislukt", firstIssue(e), "warn"); if(i>-1)redirects.splice(i,0,r); } }

    /* ---- export ---- */
    function downloadFile(name,text,mime){ try{ const blob=new Blob([text],{type:mime||"text/plain"}); const url=URL.createObjectURL(blob); const a=document.createElement("a"); a.href=url; a.download=name; document.body.appendChild(a); a.click(); a.remove(); setTimeout(()=>URL.revokeObjectURL(url),1000); }catch(e){ toast("Export niet beschikbaar","Open via de app","warn"); } }
    function exportPage(p){ const root=p.published||p.blocks; const html=renderDocument((p.seo&&p.seo.title)||p.title, root, tenant.value, theme.accent); downloadFile(p.slug+".html", html, "text/html"); log("Pagina geexporteerd: "+p.title); persist(); toast("Geexporteerd", p.slug+".html"); }

    /* ---- SEO ---- */
    const seoView=reactive({tab:"overzicht"});
    async function saveSeo(){
      try{ for(const p of pages){ if(!p.id)continue; await API.update(p.id,{slug:p.slug,title:p.title,template:p.template,locale:p.locale,seo:p.seo,blocks:p.blocks,meta:p.meta||{},excerpt:p.excerpt,featuredImage:p.featuredImage,menuOrder:p.menuOrder,visibility:p.visibility,password:p.password,commentsOpen:p.commentsOpen}); } toast("Opgeslagen","SEO en velden bewaard"); }
      catch(e){ toast("Niet opgeslagen", firstIssue(e), "warn"); } }
    const sitemapXml=computed(()=>{ const u=pages.filter(p=>p.status==="published").map(p=>"  <url><loc>https://xposcreens.com/"+p.slug+"</loc></url>").join("\n"); return '<?xml version="1.0" encoding="UTF-8"?>\n<urlset xmlns="http://www.sitemaps.org/schemas/sitemap/0.9">\n'+(u||"  <!-- nog niets gepubliceerd -->")+'\n</urlset>'; });
    function schemaFor(p){ return JSON.stringify({"@context":"https://schema.org","@type":"WebPage",name:(p.seo&&p.seo.title)||p.title,description:(p.seo&&p.seo.description)||"",url:"https://xposcreens.com/"+p.slug},null,2); }
    function seoScore(p){ let sc=0; const c=[]; const t=((p.seo&&p.seo.title)||"").length, d=((p.seo&&p.seo.description)||"").length;
      if(t>=15&&t<=60){sc+=35;c.push(["SEO-titel lengte ok",1]);} else c.push(["SEO-titel 15-60 tekens",0]);
      if(d>=50&&d<=160){sc+=35;c.push(["Omschrijving lengte ok",1]);} else c.push(["Omschrijving 50-160 tekens",0]);
      const hasH=(p.blocks.children||[]).some(b=>b.type==="xpo/hero"||b.type==="xpo/heading"); if(hasH){sc+=20;c.push(["Heeft kop/hero",1]);} else c.push(["Voeg een kop toe",0]);
      if(/^[a-z0-9-]+$/.test(p.slug)){sc+=10;c.push(["Nette slug",1]);} else c.push(["Slug opschonen",0]);
      return {score:sc,checks:c}; }
    const anaMax=computed(()=> Math.max(1, ...(anaOverview.weeks||[]).map(w=>w.views||0)));
    const seoPage=computed(()=> current.value || pages[0] || {slug:"",title:"",seo:{title:"",description:""},blocks:{children:[]}});
    const schemaCurrent=computed(()=> schemaFor(seoPage.value));
    const modalTitles={newuser:"Nieuwe gebruiker",newproduct:"Nieuw product",newcampaign:"Nieuwe campagne",newtemplate:"Nieuw template",newkb:"Nieuw KB-artikel",newform:"Nieuw formulier",newfg:"Nieuwe veldgroep",newpost:"Nieuwe post",newpopup:(()=>"Popup")()};
    const modalTitle=computed(()=> modalTitles[modal.value]||"");
    function dt(ts){ return new Date(ts).toLocaleString("nl-NL"); }
    function hm(ts){ return new Date(ts).toLocaleTimeString("nl-NL",{hour:"2-digit",minute:"2-digit"}); }

    return { loading,persistent,mode,tenant,view,sidebarOpen,notifOpen,modal,toasts,theme,rootStyle,nav,titleOf,toast,go,setTenant,toggleMode,
      pages,current,currentId,stats,np,slugify,openNew,createPage,editPage,deletePage,dirty,
      widgetDefs,cats,catWidgets,styleFields,advFields,leftTab,wq,bp,inspTab,dragType,overZone,selId,tree,col0,layers,layersFlat,sel,findNode,drag,onLayerDragStart,onLayerDragOver,onLayerDrop,onLayerDragEnd,clipboard,copyNode,pasteNode,selIds,selectNode,deleteSelection,dupSelection,copySelection,snippets,saveSnippet,insertSnippet,insertSynced,removeSnippet,renderInner,canvasHtml,styleTag,boxGet,boxSet,
      addWidget,removeNode,dupNode,move,onDrop,addRow,rmRow,toggleMulti,bpWidth,isHidden,wbgClass,wbgStyle,winStyle,setActive,
      save,publish,openPreview,preview,undo,redo,canUndo,canRedo,resetAll,markDirty,
      media,menus,templates,forms,users,products,orders,campaigns,tickets,kb,integrations,nf,pick,formId,
      onUpload,onFieldUpload,onPageUpload,mediaDelete,openPicker,chooseMedia,fmtSize,menuAdd,menuMove,menuRemove,saveMenus,
      openModal,addUser,removeUser,addProduct,removeProduct,addCampaign,removeCampaign,toggleCampaign,addTemplate,removeTemplate,addKb,removeKb,kbFromTicket,setTicketStatus,
      currentForm,addForm,selectForm,addField,removeField,toggleReq,deleteForm,submitDemo,toggleInt,
      seoView,sitemapXml,schemaFor,seoScore,saveSeo,seoPage,schemaCurrent,modalTitle,dt,hm,
      FONTS,fieldGroups,redirects,activity,fgId,currentFG,addFieldGroup,selectFG,addFGField,removeFGField,removeFieldGroup,saveFG,languages,addLanguage,setDefaultLang,toggleLang,removeLanguage,metrics,saveSettings,toggleTemplate,editTemplate,setCond,setCondVal,setTplKind,tplDoc,pageQuery,pageStatus,trashView,trashedPages,pagesFiltered,pageCounts,openTrash,closeTrash,restorePage,purgePage,translatePage,posts,terms,postQuery,postsFiltered,postCats,tagTerms,addPost,publishPost,schedulePost,trashPost,addTerm,removeTerm,togglePick,popups,openNewPopup,editPopup,savePopup,togglePopup,deletePopup,leads,deliveries,hasAction,actionTarget,toggleAction,setActionTarget,retryDelivery,mailCfg,emails,processQueue,mediaCfg,comments,commentCounts,commentFilter,setCommentFilter,approveComment,spamComment,deleteComment,tokens,globalsCfg,importText,doExport,doImport,palette,openPalette,closePalette,paletteSearch,paletteGo,aiCfg,aiKb,aiStats,aiTest,newAiKb,addAiKb,delAiKb,runAiTest,reindexAi,shopCfg,payments,coupons,newCoupon,addCoupon,toggleCoupon,removeCoupon,seoResults,analyzePage,anaOverview,loadAnalytics,anaMax,reviewsQ,loadReviews,moderateReview,customers,loadCustomers,orderOpen,toggleOrder,refundOrder,addAttr,rmAttr,addShip,rmShip,ssoCfg,ssoMapRows,addSsoMap,removeSsoMap,contentTypes,addRedirect,removeRedirect,exportPage,log,authed,loginForm,doLogin,doLogout };
  },
  template:""
};
</script>
<script type="text/html" id="tpl">
<div v-if="!authed" class="login-overlay"><div class="login-card">
  <div class="login-brand">{{ tenant==='altermedia'?'Altermedia':'XPO' }} CMS</div>
  <div class="login-sub">Log in om verder te gaan</div>
  <input class="inp" type="email" v-model="loginForm.email" placeholder="E-mail" @keyup.enter="doLogin" autocomplete="username"/>
  <input class="inp" type="password" v-model="loginForm.password" placeholder="Wachtwoord" @keyup.enter="doLogin" autocomplete="current-password"/>
  <div v-if="loginForm.error" class="login-err">{{ loginForm.error }}</div>
  <button class="pillbtn login-btn" :disabled="loginForm.busy" @click="doLogin">{{ loginForm.busy?'Bezig…':'Inloggen' }}</button>
</div></div>
<div class="shell" :style="rootStyle" v-show="authed">
  <div v-html="styleTag" style="display:none"></div>
  <aside class="sidebar" :class="{open:sidebarOpen}">
    <div class="brand"><div class="logo">{{ tenant==='xpo'?'X':'A' }}</div>
      <div><b>{{ tenant==='xpo'?'XPO':'Altermedia' }} CMS</b><small>content</small></div></div>
    <button class="pillbtn" style="margin:0 12px 10px;width:calc(100% - 24px)" @click="doLogout">Uitloggen</button>
    <nav class="nav">
      <template v-for="item in nav">
        <div v-if="item.grp" class="grp">{{ item.grp }}</div>
        <a v-else href="#" :class="{on:view===item.id}" @click.prevent="go(item.id)"><icon :n="item.ic" class="ic"/><span>{{ item.label }}</span>
          <span v-if="item.id==='pages'" class="pill">{{ stats.total }}</span></a>
      </template>
    </nav>
    <div class="sb-foot"><div class="userchip"><div class="av">MB</div>
      <div style="flex:1;min-width:0"><div class="nm">Marijn Bos</div><div class="ro">{{ persistent?'Opslag actief':'Sessie-opslag' }}</div></div>
      <button class="iconbtn" @click="toggleMode" style="color:var(--faint)"><icon :n="mode==='light'?'moon':'sun'" :s="16"/></button></div></div>
  </aside>
  <div class="navscrim" :class="{show:sidebarOpen}" @click="sidebarOpen=false"></div>

  <div class="main">
    <header class="topbar">
      <button class="iconbtn burger" @click="sidebarOpen=!sidebarOpen"><icon n="burger"/></button>
      <div class="crumbs"><span>{{ tenant==='xpo'?'XPO Screens':'Altermedia' }}</span><span>/</span><b>{{ titleOf(view) }}</b></div>
      <div class="search"><icon n="search" :s="16"/><input placeholder="Zoeken…"/></div>
      <div class="spacer"></div>
      <div class="tsw"><button :class="{on:tenant==='xpo'}" @click="setTenant('xpo')">XPO</button><button :class="{on:tenant==='altermedia'}" @click="setTenant('altermedia')">Altermedia</button></div>
      <button class="iconbtn dot" @click="notifOpen=true"><icon n="bell"/></button>
    </header>

    <main class="view" :class="{flush:view==='studio'}">

      <!-- LOADING -->
      <div v-if="loading" class="loading"><div class="spin"></div><div>CMS laden…</div></div>

      <!-- DASHBOARD -->
      <div v-else-if="view==='dashboard'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Overzicht</div><h1>Goedemiddag, Marijn</h1>
          <div class="sub">Je content draait op {{ tenant==='xpo'?'XPO Screens':'Altermedia' }}. {{ persistent?'Wijzigingen worden bewaard.':'Let op: sessie-opslag (open via de app voor blijvende opslag).' }}</div></div>
          <div class="actions"><button class="btn primary sm" @click="openNew"><icon n="plus" :s="15"/>Nieuwe pagina</button></div></div>
        <div class="grid k3" style="margin-bottom:20px">
          <div class="card kpi"><div class="lbl">Paginas</div><div class="val">{{ stats.total }}</div></div>
          <div class="card kpi"><div class="lbl">Live</div><div class="val">{{ stats.live }}</div></div>
          <div class="card kpi"><div class="lbl">Concept</div><div class="val">{{ stats.draft }}</div></div>
        </div>
        <div class="card"><div class="row" style="margin-bottom:12px"><div class="ct" style="flex:1">Recente paginas</div><button class="btn subtle sm" @click="go('pages')">Alles</button></div>
          <table><tbody><tr v-for="p in pages.slice(0,5)">
            <td><div class="rt">{{ p.title }}</div><div class="rs mono">/{{ p.slug }}</div></td>
            <td style="width:90px"><span class="badge" :class="p.status==='published'?'ok':'dim'"><span class="dotled"></span>{{ p.status==='published'?'Live':'Concept' }}</span></td>
            <td style="width:60px;text-align:right"><button class="iconbtn" @click="editPage(p)"><icon n="studio" :s="16"/></button></td></tr></tbody></table></div>
        <div class="card" style="margin-top:18px"><div class="row" style="margin-bottom:6px"><div class="ct" style="flex:1">Recente activiteit</div><button class="btn subtle sm" @click="go('activity')">Alles</button></div>
          <div v-for="a in activity.slice(0,4)" class="fitem" style="gap:10px;margin-bottom:0;background:transparent;padding:7px 0;border-bottom:1px solid var(--line)"><span class="dotled" :style="{background: a.kind==='warn'?'var(--warn)':'var(--ok)'}"></span><span style="flex:1">{{ a.text }}</span><span class="faint" style="font-size:11px">{{ hm(a.when) }}</span></div></div>
      </div>

      <!-- PAGES -->
      <div v-else-if="view==='pages'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Content</div><h1>Paginas</h1><div class="sub">{{ pageCounts.all }} paginas · {{ pageCounts.published }} live · {{ pageCounts.scheduled }} gepland</div></div>
          <div class="actions"><button class="btn primary" @click="openNew"><icon n="plus" :s="15"/>Nieuwe pagina</button></div></div>

        <div v-if="!trashView" class="row" style="gap:10px;flex-wrap:wrap;margin-bottom:16px">
          <input class="inp" v-model="pageQuery" placeholder="Zoek op titel of slug…" style="flex:1;min-width:200px"/>
          <span class="seg">
            <button :class="{on:pageStatus==='all'}" @click="pageStatus='all'">Alle ({{ pageCounts.all }})</button>
            <button :class="{on:pageStatus==='published'}" @click="pageStatus='published'">Live ({{ pageCounts.published }})</button>
            <button :class="{on:pageStatus==='draft'}" @click="pageStatus='draft'">Concept ({{ pageCounts.draft }})</button>
            <button :class="{on:pageStatus==='scheduled'}" @click="pageStatus='scheduled'">Gepland ({{ pageCounts.scheduled }})</button>
          </span>
          <button class="btn ghost sm" @click="openTrash"><icon n="trash" :s="14"/>Prullenbak</button>
        </div>

        <!-- prullenbak -->
        <div v-if="trashView">
          <div class="row" style="margin-bottom:14px"><button class="btn ghost sm" @click="closeTrash"><icon n="up" :s="14"/>Terug</button><h3 style="margin:0 0 0 6px;font-size:16px">Prullenbak</h3></div>
          <div v-if="!trashedPages.length" class="empty"><div class="ei"><icon n="trash" :s="22"/></div><div style="color:var(--text);font-weight:500">Prullenbak is leeg</div></div>
          <div v-else class="tbl"><table><thead><tr><th>Pagina</th><th>Taal</th><th></th></tr></thead><tbody>
            <tr v-for="p in trashedPages"><td><div class="rt">{{ p.title }}</div><div class="rs mono">/{{ p.slug }}</div></td><td><span class="badge dim">{{ p.locale.toUpperCase() }}</span></td>
              <td style="text-align:right;white-space:nowrap"><button class="btn ghost sm" @click="restorePage(p)">Herstellen</button> <button class="btn subtle sm" style="color:var(--danger)" @click="purgePage(p)">Definitief</button></td></tr>
          </tbody></table></div>
        </div>

        <!-- lijst -->
        <template v-else>
          <div v-if="!pagesFiltered.length" class="empty"><div class="ei"><icon n="pages" :s="22"/></div><div style="color:var(--text);font-weight:500">Geen paginas gevonden</div><button class="btn primary sm" @click="openNew"><icon n="plus" :s="14"/>Nieuwe pagina</button></div>
          <div v-else class="grid k3">
            <div class="pagecard" v-for="p in pagesFiltered" @click="editPage(p)">
              <div class="row"><div class="pt" style="flex:1">{{ p.parentId?'— ':'' }}{{ p.title }}</div>
                <span class="badge" :class="p.status==='published'?'ok':p.status==='scheduled'?'warn':'dim'"><span class="dotled"></span>{{ p.status==='published'?'Live':p.status==='scheduled'?'Gepland':'Concept' }}</span></div>
              <div class="pu mono">/{{ p.slug }}</div>
              <div class="pmeta"><span class="badge dim">{{ p.template }}</span><span class="badge dim">{{ p.locale.toUpperCase() }}</span><span class="badge dim" title="interne · afbeeldingslinks"><icon n="seo" :s="11"/> {{ p.links.internal }}·{{ p.links.image }}</span></div>
              <div class="faint" style="font-size:11.5px;margin-top:8px">{{ p.author||'—' }}<span v-if="p.scheduledAt"> · {{ new Date(p.scheduledAt).toLocaleString('nl-NL') }}</span></div>
              <div class="row" style="margin-top:12px;gap:8px">
                <button class="btn ghost sm" @click.stop="editPage(p)"><icon n="studio" :s="14"/>Bewerken</button>
                <button class="btn subtle sm" @click.stop="currentId=p.id; openPreview(true)"><icon n="eye" :s="14"/></button>
                <button class="btn subtle sm" @click.stop="translatePage(p,'en')" title="Engelse vertaling maken"><icon n="lang" :s="14"/></button>
                <button class="btn subtle sm" style="margin-left:auto;color:var(--faint)" @click.stop="deletePage(p)"><icon n="trash" :s="14"/></button>
              </div>
            </div>
          </div>
        </template>
      </div>


      <!-- STUDIO -->
      <div v-else-if="view==='posts'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Content</div><h1>Posts</h1><div class="sub">{{ posts.length }} posts · {{ postCats.length }} categorieën · {{ tagTerms.length }} tags</div></div>
          <div class="actions"><button class="btn primary" @click="modal='newpost'"><icon n="plus" :s="15"/>Nieuwe post</button></div></div>
        <div class="grid dash2">
          <div>
            <div class="row" style="margin-bottom:12px"><input class="inp" v-model="postQuery" placeholder="Zoek posts…" style="flex:1"/></div>
            <div v-if="!postsFiltered.length" class="empty"><div class="ei"><icon n="pages" :s="22"/></div><div style="color:var(--text);font-weight:500">Geen posts</div></div>
            <div v-else class="tbl"><table><thead><tr><th>Post</th><th>Categorieën</th><th>Tags</th><th>Status</th><th></th></tr></thead><tbody>
              <tr v-for="p in postsFiltered"><td><div class="rt">{{ p.title }}</div><div class="rs mono">/{{ p.slug }}</div></td>
                <td><span v-for="c in p.categories" class="badge dim" style="margin:2px 4px 2px 0">{{ c.name }}</span></td>
                <td><span v-for="t in p.tags" class="badge dim" style="margin:2px 4px 2px 0">{{ t.name }}</span></td>
                <td><span class="badge" :class="p.status==='published'?'ok':p.status==='scheduled'?'warn':'dim'"><span class="dotled"></span>{{ p.status==='published'?'Live':p.status==='scheduled'?'Gepland':'Concept' }}</span></td>
                <td style="text-align:right;white-space:nowrap"><button v-if="p.status!=='published'" class="btn ghost sm" @click="publishPost(p)">Publiceren</button> <button class="btn subtle sm" @click="schedulePost(p)" title="Inplannen"><icon n="bell" :s="14"/></button> <button class="btn subtle sm" style="color:var(--faint)" @click="trashPost(p)"><icon n="trash" :s="14"/></button></td></tr>
            </tbody></table></div>
          </div>
          <div class="card" style="align-self:start">
            <div class="ct" style="margin-bottom:12px">Taxonomie</div>

                <div class="field" v-else-if="f.t==='media'"><label>{{ f.l }}</label><div v-if="sel.settings._style[f.k]" style="margin-bottom:8px"><video v-if="f.kind==='video'" :src="sel.settings._style[f.k]" muted loop style="width:100%;border-radius:8px;display:block;background:#000"></video><img v-else :src="sel.settings._style[f.k]" style="width:100%;border-radius:8px;display:block"/></div><input class="inp mono" v-model="sel.settings._style[f.k]" placeholder="URL of upload" style="margin-bottom:8px"/><div class="row" style="gap:8px"><label class="btn ghost sm" style="cursor:pointer"><icon n="upload" :s="14"/>Upload<input type="file" :accept="f.kind==='video'?'video/mp4,video/webm':'image/*'" @change="onFieldUpload($event,f.k,'style')" style="display:none"/></label><button v-if="f.kind!=='video'" class="btn ghost sm" @click="openPicker(f.k,'style')"><icon n="media" :s="14"/>Bibliotheek</button><button v-if="sel.settings._style[f.k]" class="btn subtle sm" @click="sel.settings._style[f.k]=''">Wis</button></div></div>
                </template>
              </template>
            </div>
            <div v-else class="igrp">
              <template v-for="f in advFields" :key="f.k">
                <div class="field" v-if="f.t==='multi'"><label>{{ f.l }}</label><div class="row" style="flex-wrap:wrap;gap:8px"><button v-for="o in f.opts" class="chip" :class="{on:sel.settings._adv[f.k].includes(o[0])}" @click="toggleMulti(sel.settings._adv[f.k],o[0])">{{ o[1] }}</button></div></div>
                <div class="field" v-else-if="f.t==='datetime'"><label>{{ f.l }}</label><input type="datetime-local" class="inp" :value="sel.settings._adv[f.k]||''" @input="sel.settings._adv[f.k]=$event.target.value"/></div>
                <div class="field" v-else-if="f.t==='select'"><label>{{ f.l }}</label><select class="inp" :value="sel.settings._adv[f.k]||'none'" @change="sel.settings._adv[f.k]=$event.target.value"><option v-for="o in f.opts" :value="o">{{ o }}</option></select></div>
              </template>
              <div class="faint" style="font-size:12px;line-height:1.6;margin-top:6px"><icon n="shield" :s="13" style="vertical-align:-2px;color:var(--accent)"/> Inhoud wordt gevalideerd en veilig gerenderd — scripts en gevaarlijke links worden geblokkeerd.</div>
            </div>
          </template>
          <div v-else-if="current && !current._tpl" class="igrp" style="overflow-y:auto">
            <h5>Pagina-instellingen</h5>
            <div class="field"><label>Uitgelichte afbeelding</label>

              <input class="inp mono" v-model="current.featuredImage" placeholder="URL of upload" style="margin-bottom:8px"/>
              <div class="row" style="gap:8px"><label class="btn ghost sm" style="cursor:pointer"><icon n="upload" :s="14"/>Upload<input type="file" accept="image/*" @change="onPageUpload($event,'featuredImage')" style="display:none"/></label><button v-if="current.featuredImage" class="btn subtle sm" @click="current.featuredImage=''">Wis</button></div>
            </div>
            <div class="field"><label>Samenvatting (excerpt)</label><textarea class="inp" rows="3" v-model="current.excerpt" placeholder="Korte omschrijving voor overzichten en SEO"></textarea></div>
            <div class="field"><label>Zichtbaarheid</label><div class="seg seg-wrap"><button :class="{on:!current.visibility||current.visibility==='public'}" @click="current.visibility='public'">Openbaar</button><button :class="{on:current.visibility==='private'}" @click="current.visibility='private'">Privé</button><button :class="{on:current.visibility==='password'}" @click="current.visibility='password'">Wachtwoord</button></div></div>
            <div class="field" v-if="current.visibility==='password'"><label>Wachtwoord</label><input class="inp" v-model="current.password" placeholder="Wachtwoord om te bekijken"/></div>
            <div class="field" v-if="current.visibility==='private'"><div class="faint" style="font-size:12px">Privé-paginas zijn niet publiek bereikbaar — bekijk ze via Voorbeeld.</div></div>
            <div class="field"><label class="row" style="gap:8px;cursor:pointer;margin:0"><input type="checkbox" :checked="current.commentsOpen" @change="current.commentsOpen=$event.target.checked"/>Reacties toestaan</label></div>
            <div class="field"><div class="slidehead"><label style="margin:0">Menu-volgorde</label><span class="v">{{ current.menuOrder||0 }}</span></div><input type="number" class="inp" :value="current.menuOrder||0" @input="current.menuOrder=Number($event.target.value)||0"/></div>
            <button class="btn primary" style="width:100%;margin-top:8px" @click="save()">Instellingen opslaan</button>
          </div>
          <div v-else class="empty"><div class="ei"><icon n="studio" :s="22"/></div><div style="color:var(--text);font-weight:500">Niets geselecteerd</div><p style="font-size:12.5px;max-width:200px">Klik een widget op de canvas of in Lagen om die aan te passen.</p></div>
        </div>
        </template>
        <div v-else class="empty" style="grid-column:1/-1"><div class="ei"><icon n="pages" :s="22"/></div><div style="color:var(--text);font-weight:500">Geen pagina gekozen</div><p style="font-size:12.5px">Kies een pagina of maak een nieuwe aan.</p><button class="btn primary sm" @click="go('pages')">Naar paginas</button></div>
      </div>

      <!-- MEDIA -->
      <div v-else-if="view==='media'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Bibliotheek</div><h1>Media</h1><div class="sub">Upload afbeeldingen en gebruik ze in de Afbeelding-widget. In productie: DAM op Azure Blob.</div></div>
          <div class="actions"><label class="btn primary"><icon n="upload" :s="15"/>Uploaden<input type="file" multiple accept="image/*" @change="onUpload" style="display:none"/></label></div></div>
        <div class="card" style="margin-bottom:18px"><div class="row" style="align-items:center;gap:14px;flex-wrap:wrap"><div style="flex:1;min-width:200px"><div class="ct">Opslag</div><div class="faint" style="font-size:12px">Lokaal = op de server. Azure Blob = schaalbare cloudopslag (vereist @azure/storage-blob + een SAS-token). Zonder geldige config valt upload netjes terug op lokaal.</div></div>
          <div class="seg" style="width:160px"><button :class="{on:mediaCfg.driver==='local'}" @click="mediaCfg.driver='local';saveSettings()">Lokaal</button><button :class="{on:mediaCfg.driver==='blob'}" @click="mediaCfg.driver='blob';saveSettings()">Azure Blob</button></div></div>
          <div v-if="mediaCfg.driver==='blob'" class="grid k2" style="margin-top:12px">
            <div class="field" style="margin:0"><label>Account-URL</label><input class="inp mono" v-model="mediaCfg.accountUrl" @change="saveSettings" placeholder="https://account.blob.core.windows.net"/></div>
            <div class="field" style="margin:0"><label>Container</label><input class="inp" v-model="mediaCfg.container" @change="saveSettings"/></div>
            <div class="field" style="margin:0;grid-column:1/-1"><label>SAS-token</label><input class="inp mono" type="password" v-model="mediaCfg.sasToken" @change="saveSettings" placeholder="sv=…&ss=b&srt=…&sp=rwc&sig=…"/></div>
          </div></div>
        <label v-if="!media.length" class="uploadzone"><icon n="upload" :s="26" style="color:var(--accent)"/><div style="margin-top:10px;font-weight:500;color:var(--text)">Sleep of klik om te uploaden</div><div style="font-size:12px;margin-top:4px">PNG, JPG of WebP · max 1,6 MB</div><input type="file" multiple accept="image/*" @change="onUpload" style="display:none"/></label>
        <div v-else class="mgrid">
          <div class="mcard" v-for="m in media"><button class="del" @click="mediaDelete(m)"><icon n="trash" :s="14"/></button><img :src="m.src"/><div class="mb"><div class="mn">{{ m.name }}</div><div class="md">{{ fmtSize(m.size) }}</div></div></div>
        </div>
      </div>

      <!-- SEO -->
      <div v-else-if="view==='seo'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Vindbaarheid</div><h1>SEO</h1><div class="sub">Meta, score, sitemap en schema — net als RankMath, ingebouwd.</div></div>
          <div class="actions"><button class="btn primary sm" @click="saveSeo"><icon n="check" :s="14"/>Bewaren</button></div></div>
        <div class="tabs"><button :class="{on:seoView.tab==='overzicht'}" @click="seoView.tab='overzicht'">Overzicht & score</button><button :class="{on:seoView.tab==='sitemap'}" @click="seoView.tab='sitemap'">Sitemap</button><button :class="{on:seoView.tab==='redirects'}" @click="seoView.tab='redirects'">Redirects</button><button :class="{on:seoView.tab==='schema'}" @click="seoView.tab='schema'">Schema</button></div>
        <div v-if="seoView.tab==='overzicht'">
          <div class="card" v-for="p in pages" style="margin-bottom:14px">
            <div class="row" style="margin-bottom:10px"><div style="flex:1"><div class="rt">{{ p.title }}</div><div class="rs mono">/{{ p.slug }}</div></div>
              <div class="score" :style="{color: seoScore(p).score>=70?'var(--ok)':seoScore(p).score>=40?'var(--warn)':'var(--danger)'}">{{ seoScore(p).score }}</div></div>
            <div class="prog" style="margin-bottom:12px"><i :style="{width:seoScore(p).score+'%', background: seoScore(p).score>=70?'var(--ok)':seoScore(p).score>=40?'var(--warn)':'var(--danger)'}"></i></div>
            <div class="grid k2">
              <div class="field" style="margin:0"><label>SEO-titel</label><input class="inp" v-model="p.seo.title" placeholder="bv. Smart mirrors — XPO Screens"/></div>
              <div class="field" style="margin:0"><label>Meta-omschrijving</label><input class="inp" v-model="p.seo.description" placeholder="50–160 tekens"/></div>
            </div>
            <div class="grid k2" style="margin-top:12px">
              <div class="field" style="margin:0"><label>OG-afbeelding (URL)</label><input class="inp" v-model="p.seo.ogImage" placeholder="https://…/share.jpg"/></div>
              <div class="field" style="margin:0"><label>Canonical (optioneel)</label><input class="inp mono" v-model="p.seo.canonical" placeholder="laat leeg voor standaard"/></div>
            </div>
            <div class="grid k2" style="margin-top:12px">
              <div class="field" style="margin:0"><label>Focuskeyword</label><input class="inp" v-model="p.seo.keyword" placeholder="bv. digitale signage" @keyup.enter="analyzePage(p)"/></div>
              <div class="field" style="margin:0;align-self:end"><button class="btn ghost" @click="analyzePage(p)"><icon n="bolt" :s="14"/>Analyseer content</button></div>
            </div>
            <label class="row" style="gap:8px;margin-top:10px;cursor:pointer"><input type="checkbox" v-model="p.seo.noindex"/><span class="muted" style="font-size:13px">Niet indexeren (noindex, nofollow)</span></label>
            <div v-if="seoResults[p.id]" style="margin-top:14px">
              <div class="row" style="gap:16px;flex-wrap:wrap;margin-bottom:10px">
                <span class="badge dim"><b>{{ seoResults[p.id].stats.words }}</b>&nbsp;woorden</span>
                <span class="badge dim">Dichtheid <b>{{ seoResults[p.id].stats.density }}%</b></span>
                <span class="badge dim">Leesbaarheid <b>{{ seoResults[p.id].stats.readabilityLabel }}</b> ({{ seoResults[p.id].stats.readability }})</span>
                <span class="badge dim">Alt {{ seoResults[p.id].stats.imagesWithAlt }}/{{ seoResults[p.id].stats.images }}</span>
                <span class="badge dim">Links {{ seoResults[p.id].stats.internalLinks }} intern · {{ seoResults[p.id].stats.externalLinks }} extern</span>
              </div>
              <div class="kv"><span v-for="c in seoResults[p.id].checks" class="badge" :class="c.ok?'ok':'dim'"><span class="dotled"></span>{{ c.label }}{{ c.info?(' · '+c.info):'' }}</span></div>
            </div>
            <div v-else class="kv" style="margin-top:12px"><span v-for="c in seoScore(p).checks" class="badge" :class="c[1]?'ok':'dim'"><span class="dotled"></span>{{ c[0] }}</span></div>
            <div v-if="fieldGroups.length && p.meta" class="igrp" style="border:0;padding:0;margin-top:14px">
              <h5 style="margin:0 0 8px;font-size:12px;color:var(--faint);text-transform:uppercase;letter-spacing:1px">Custom velden</h5>
              <div class="grid k2"><template v-for="g in fieldGroups"><div class="field" style="margin:0" v-for="fl in g.fields" :key="fl.id">
                <label>{{ fl.label }}</label>
                <label v-if="fl.type==='toggle'" class="row" style="gap:8px"><input type="checkbox" v-model="p.meta[fl.id]"/><span class="muted" style="font-size:13px">{{ p.meta[fl.id]?'Ja':'Nee' }}</span></label>
                <textarea v-else-if="fl.type==='textarea'" class="inp" rows="2" v-model="p.meta[fl.id]"></textarea>
                <select v-else-if="fl.type==='select'" class="inp" v-model="p.meta[fl.id]"><option value="">—</option><option v-for="o in (fl.options||[])" :value="o">{{ o }}</option></select>
                <input v-else-if="fl.type==='color'" class="inp" type="color" v-model="p.meta[fl.id]"/>
                <div v-else-if="fl.type==='repeater'">
                  <div v-for="(row,ri) in (Array.isArray(p.meta[fl.id])?p.meta[fl.id]:(p.meta[fl.id]=[]))" :key="ri" class="row" style="gap:6px;margin-bottom:6px"><input class="inp" style="flex:1" v-model="p.meta[fl.id][ri]"/><button class="iconbtn" style="width:26px;height:26px;color:var(--faint)" @click="p.meta[fl.id].splice(ri,1)"><icon n="x" :s="13"/></button></div>
                  <button class="btn ghost sm" @click="(Array.isArray(p.meta[fl.id])?p.meta[fl.id]:(p.meta[fl.id]=[])).push('')"><icon n="plus" :s="13"/>Rij</button>
                </div>
                <input v-else class="inp" :type="fl.type==='number'?'number':fl.type==='date'?'date':fl.type==='email'?'email':'text'" v-model="p.meta[fl.id]"/>
              </div></template></div>
            </div>
          </div>
        </div>
        <div v-else-if="seoView.tab==='sitemap'" class="card"><div class="ct" style="margin-bottom:8px">sitemap.xml <span class="faint" style="font-weight:400">— automatisch gegenereerd uit gepubliceerde paginas</span></div><div class="codebox">{{ sitemapXml }}</div></div>
        <div v-else-if="seoView.tab==='redirects'" class="card"><div class="ct" style="margin-bottom:12px">Redirects</div>

          <table><thead><tr><th>Van</th><th>Naar</th><th>Code</th><th></th></tr></thead><tbody>
            <tr v-for="r in redirects"><td class="mono">{{ r.from }}</td><td class="mono">{{ r.to }}</td><td><span class="badge dim">{{ r.code }}</span></td><td style="text-align:right"><button class="iconbtn" style="width:26px;height:26px;color:var(--faint)" @click="removeRedirect(r)"><icon n="x" :s="13"/></button></td></tr>
          </tbody></table>
        </div>
        <div v-else class="card"><div class="ct" style="margin-bottom:8px">JSON-LD schema <span class="faint" style="font-weight:400">— {{ seoPage.title }}</span></div><div class="codebox">{{ schemaCurrent }}</div></div>
      </div>

      <!-- LANGUAGES -->
      <div v-else-if="view==='languages'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Internationaal</div><h1>Talen</h1><div class="sub">Locale-routing met hreflang; de standaardtaal staat op het hoofdpad.</div></div></div>
        <div class="card" style="margin-bottom:16px">
          <div class="ct" style="margin-bottom:12px">Taal toevoegen</div>
          <div class="row" style="gap:8px;flex-wrap:wrap">
            <input class="inp" v-model="nf.lflag" placeholder="Vlag 🇫🇷" style="width:90px"/>
            <input class="inp" v-model="nf.lcode" placeholder="Code (fr)" style="width:110px"/>
            <input class="inp" v-model="nf.llabel" placeholder="Naam (Français)" style="flex:1;min-width:140px"/>
            <input class="inp" v-model="nf.lpath" placeholder="Pad (/fr/)" style="width:120px"/>
            <button class="btn primary" @click="addLanguage"><icon n="plus" :s="15"/>Toevoegen</button>
          </div>
        </div>
        <div v-if="!languages.length" class="empty"><div class="ei"><icon n="lang" :s="22"/></div><div style="color:var(--text);font-weight:500">Nog geen talen</div></div>
        <div v-else class="grid k3"><div class="card" v-for="l in languages" :key="l.code">
          <div class="row" style="gap:10px"><span style="font-size:22px">{{ l.flag || '🌐' }}</span>
            <div style="flex:1;min-width:0"><h4 style="font-size:16px">{{ l.label }}</h4><div class="rs mono">{{ l.path }} · {{ l.code }}</div></div>
            <button class="iconbtn" style="width:26px;height:26px;color:var(--faint)" :disabled="l.default" @click="removeLanguage(l)"><icon n="trash" :s="13"/></button></div>
          <div class="row" style="gap:8px;margin-top:14px">
            <span v-if="l.default" class="badge ok"><span class="dotled"></span>Standaard</span>
            <button v-else class="btn ghost sm" @click="setDefaultLang(l)">Maak standaard</button>
            <span class="badge" :class="l.enabled?'ok':'dim'" style="cursor:pointer;margin-left:auto" @click="toggleLang(l)">{{ l.enabled?'Actief':'Uit' }}</span></div>
        </div></div>
      </div>

      <!-- SETTINGS -->
      <div v-else-if="view==='settings'" class="wrap">
        <div class="head"><div class="eyebrow">Systeem</div><h1>Instellingen</h1><div class="sub">Weergave, merk en opslag.</div></div>
        <div class="grid dash2">
          <div class="card"><div class="ct" style="margin-bottom:16px">Weergave</div>
            <div class="field"><label>Modus</label><div class="seg"><button :class="{on:mode==='dark'}" @click="mode!=='dark'&&toggleMode()">Donker</button><button :class="{on:mode==='light'}" @click="mode!=='light'&&toggleMode()">Licht</button></div></div>
            <div class="field"><label>Merk (accentkleur)</label><div class="row"><span class="swatch" :style="{background:'#5F8D7A'}" :class="{on:tenant==='xpo'}" @click="setTenant('xpo')"></span><span class="swatch" :style="{background:'#E72B2B'}" :class="{on:tenant==='altermedia'}" @click="setTenant('altermedia')"></span></div></div>
            <div class="field" style="margin:0"><div class="slidehead"><label style="margin:0">Hoekradius</label><span class="v">{{ theme.radius }}px</span></div><input type="range" min="0" max="22" v-model.number="theme.radius" @change="saveSettings"/></div>
          </div>
          <div class="card"><div class="ct" style="margin-bottom:12px">Opslag</div>
            <div class="srow"><div class="si"><icon n="shield" :s="17"/></div><div style="flex:1"><div class="st">{{ persistent?'Persistente opslag':'Sessie-opslag' }}</div><div class="sd">{{ persistent?'Wijzigingen blijven bewaard.':'Open via de app voor blijvende opslag.' }}</div></div><span class="badge" :class="persistent?'ok':'warn'"><span class="dotled"></span>{{ persistent?'Actief':'Sessie' }}</span></div>
            <div class="srow" style="border:0"><div style="flex:1"><div class="st">Demodata herstellen</div><div class="sd">Zet de voorbeeldpagina terug (overschrijft alles).</div></div><button class="btn danger sm" @click="modal='reset'">Herstellen</button></div>
            <p class="faint" style="font-size:12px;margin-top:10px">In productie is de opslag de NestJS + Azure SQL backend; dezelfde validatie- en render-regels gelden daar.</p>
          </div>
        </div>
      </div>


      <!-- TEMPLATES -->
      <div v-else-if="view==='templates'" class="wrap">
        <div class="head head-row"><div><div class="eyebrow">Theme Builder</div><h1>Templates</h1><div class="sub">Header, footer en dynamische paginatypes — overal automatisch toegepast.</div></div>
          <div class="actions"><button class="btn primary" @click="openModal('newtemplate')"><icon n="plus" :s="15"/>Nieuw template</button></div></div>
        <div class="tbl"><table><thead><tr><th>Template</th><th>Soort</th><th>Voorwaarde</th><th>Status</th><th></th></tr></thead><tbody>
          <tr v-for="t in templates"><td class="rt">{{ t.name }}</td>
            <td><select class="inp" style="width:110px;padding:5px 8px" :value="t.kind" @change="setTplKind(t,$event.target.value)"><option value="header">Header</option><option value="footer">Footer</option><option value="single">Single</option><option value="section">Sectie</option></select></td>
            <td><div class="row" style="gap:6px">
              <select class="inp" style="width:120px;padding:5px 8px" :value="(t.conditions[0]||{}).type||'all'" @change="setCond(t,$event.target.value)"><option value="all">Hele site</option><option value="post-type">Type</option><option value="page">Pagina</option><option value="post">Post</option></select>

            </div></td>
